name: songrec # you probably want to 'snapcraft register <name>'
adopt-info: share
title: SongRec
summary: Unofficial Shazam client for Linux, written in Rust
description: |
  SongRec is an unofficial Shazam client for Linux, written in Rust. It allows you to easily recognize songs from your speakers, microphone or audio files.
  
  Features:
  - Recognize audio from an arbitrary audio file.
  - Recognize audio from the microphone.
  - Usage from both GUI and command line (for the file recognition part).
  - Provide an history of the recognized songs on the GUI, exportable to CSV.
  - Continuous song detection from the microphone, with the ability to choose your input device.
  - Ability to recognize songs from your speakers rather than your microphone (on compatible PulseAudio setups).
license: GPL-3.0+
base: core24 # the base snap is the execution environment for this snap
version: '0.6.4' # just for humans, typically '1.2+git' or '1.3.2'

grade: stable # must be 'stable' to release into candidate/stable channels
confinement: strict # use 'strict' once you have the right plugs and slots

apps:
  songrec:
    command-chain:
    - snap/command-chain/alsa-launch
    command: bin/songrec
    desktop: usr/share/applications/com.github.marinm.songrec.desktop
    extensions: [gnome]
    plugs:
      - home
      - network
      - network-status
      - unity7
      - alsa
      - audio-record
      - audio-playback
    slots: [dbus-svc, mpris]

environment:
  ALWAYS_USE_PULSEAUDIO: '1'

slots:
  dbus-svc: # name that is used with 'snap connect' on slots side
    interface: dbus
    bus: session
    name: com.github.marinm.songrec


parts:
  songrec:
    build-packages:
      - libasound2-dev

    plugin: rust
    rust-use-global-lto: true
    source: .

    after: [alsa-mixin]

  alsa-mixin:
    plugin: dump
    source: https://github.com/diddlesnaps/snapcraft-alsa.git
    source-subdir: snapcraft-assets
    build-packages:
      - libasound2-dev
    stage-packages:
      - libasound2
      - libasound2-plugins
      - yad
    stage:
      # restrict to only audio-related files - you need to ensure
      # that gtk3 is staged for yad to work correctly, to prompt
      # users to connect the alsa plug or proceed with pulseaudio.
      #
      # This helps prevent symbol conflicts in situations where
      # you're using a non-default library, such as those that the
      # gnome-3-34 extension for core18 provides.
      - etc/asound.conf
      - snap/command-chain/alsa-launch
      - usr/bin/yad*
      - usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/alsa-lib
      - usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/libasound*
      - usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/libdnsfile*
      - usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/libFLAC*
      - usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/libjack*
      - usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/libpulse*
      - usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/libsamplerate*
      - usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/libspeex*
      - usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/libvorbis*
      - usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/pulseaudio
  
  translations:
    plugin: dump
    source: translations/
    source-type: local

    override-pull: |
      snapcraftctl pull

      mkdir -p bin/translations
      mkdir -p snap/command-chain
      mv locale bin/translations/
      cp -a bin/translations snap/command-chain/
      rm -f README.md interface.ui.h songrec.pot update_po_files.sh
  
    after: [share]

  share:
    plugin: dump
    source: packaging/rootfs/
    parse-info: [usr/share/metainfo/re.fossplant.songrec.metainfo.xml]
    source-type: local

    override-pull: |
      snapcraftctl pull

      # Point icon to the correct location
      mv usr/share/applications/re.fossplant.songrec.desktop usr/share/applications/com.github.marinm.songrec.desktop
      sed -i -e 's|re.fossplant.songrec.desktop|com.github.marinm.songrec.desktop|g' usr/share/metainfo/re.fossplant.songrec.metainfo.xml
      sed -i -e 's|Icon=re.fossplant.songrec|Icon=/usr/share/icons/hicolor/scalable/apps/re.fossplant.songrec.svg|g' usr/share/applications/com.github.marinm.songrec.desktop

layout:
  /usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/alsa-lib:
    bind: $SNAP/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/alsa-lib
  /usr/share/X11/XErrorDB:
    symlink: $SNAP/gpu-2404/X11/XErrorDB
  /usr/share/alsa:
    bind: $SNAP/usr/share/alsa
